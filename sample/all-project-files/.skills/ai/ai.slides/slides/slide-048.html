<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #f5f8fc; }
    p, ul, li { margin: 0; padding: 0; }
    .slide-container {
      width: 794px;
      height: 1123px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Noto Sans KR', sans-serif;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<div class="slide-container">
<!-- Outline Guide -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 0px; left: 0px; width: 794px; height: 1123px; border: 1.5px solid #1B3A6E; box-sizing: border-box; pointer-events: none; z-index: 100;"></div>
<!-- Eyebrow: CHAPTER -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 140px; left: 80px; width: 634px; height: 30px; z-index: 10;">
<p style="font-size: 14px; color: #1B3A6E; font-weight: 500; letter-spacing: 4px;">CHAPTER</p>
</div>
<!-- Big Number: 02 -->
<!-- Fix: Increased height to 200px and adjusted top to prevent paintAboveDeclaredBox issue (22px overflow reported) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 130px; left: 75px; width: 634px; height: 210px; z-index: 10;">
<p style="font-size: 122px; color: #1B3A6E; font-weight: 800; line-height: 1.1; letter-spacing: -4px;">02</p>
</div>
<!-- Illustration Main Background (Navy) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 340px; left: 80px; width: 634px; height: 360px; background-color: #1B3A6E; border-radius: 16px; z-index: 1;"></div>
<!-- Illustration Element 1 (Blue tilted square) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 420px; left: 170px; width: 180px; height: 180px; background-color: #2E5BBA; border-radius: 12px; transform: rotate(-12deg); opacity: 0.85; z-index: 2;"></div>
<!-- Illustration Element 2 (Yellow circle) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 400px; left: 540px; width: 80px; height: 80px; background-color: #FFC857; border-radius: 50%; z-index: 2;"></div>
<!-- Illustration Element 3 (White rect) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 580px; left: 500px; width: 150px; height: 85px; background-color: #ffffff; border-radius: 8px; opacity: 0.92; z-index: 2;"></div>
<!-- Divider Line -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 760px; left: 80px; width: 634px; height: 3px; background-color: #1B3A6E; z-index: 1;"></div>
<!-- Chapter Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 790px; left: 80px; width: 634px; height: 50px; z-index: 10;">
<p style="font-size: 24px; color: #1B3A6E; font-weight: 700; line-height: 1.3;">2. 문서·인사 행정 자동화</p>
</div>
<!-- Section List -->
<!-- Fix: Increased height and line-height slightly to better distribute content and fill vertical space -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 850px; left: 80px; width: 634px; height: 250px; z-index: 10;">
<ul style="list-style: none; color: #5F5E5A; font-size: 15px; line-height: 2.2; font-weight: 400;">
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.1 공문서 자동 작성</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.2 회의록 작성과 후속 관리</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.3 보도자료·안내문·이메일</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.4 보고서 종합 실습</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.5 인사 데이터 정리</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.6 채용·평가·교육</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 2.7 종합 실전 — 인사 발령 시즌</li>
</ul>
</div>
<!-- Page Number -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 1083px; left: 80px; width: 634px; height: 20px; z-index: 10;">
<p style="font-size: 12px; color: #5F5E5A; text-align: right;">96</p>
</div>
</div>
</body>
</html>
