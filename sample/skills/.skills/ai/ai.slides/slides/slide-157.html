<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #f5f8fc; }
    p, ul, li { margin: 0; padding: 0; }
    .slide-container {
      width: 794px;
      height: 1123px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Noto Sans KR', sans-serif;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<div class="slide-container">
<!-- Outline Guide -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 0px; left: 0px; width: 794px; height: 1123px; border: 1.5px solid #1B3A6E; box-sizing: border-box; pointer-events: none; z-index: 100;"></div>
<!-- Eyebrow: CHAPTER -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 140px; left: 80px; width: 634px; height: 30px; z-index: 10;">
<p style="font-size: 18px; color: #1B3A6E; font-weight: 500; letter-spacing: 4px;">CHAPTER</p>
</div>
<!-- Big Number: 04 -->
<!-- Fixed top to prevent glyph clipping at top (shifted from 155 to 160) and increased height to 185 -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 160px; left: 75px; width: 634px; height: 185px; z-index: 10;">
<p style="font-size: 122px; color: #1B3A6E; font-weight: 800; line-height: 1; letter-spacing: -4px;">04</p>
</div>
<!-- Illustration Main Background (Navy) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 340px; left: 80px; width: 634px; height: 360px; background-color: #1B3A6E; border-radius: 16px; z-index: 1;"></div>
<!-- Illustration Element 1 (Blue tilted square) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 420px; left: 170px; width: 180px; height: 180px; background-color: #2E5BBA; border-radius: 12px; transform: rotate(-12deg); opacity: 0.85; z-index: 2;"></div>
<!-- Illustration Element 2 (Yellow circle) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 400px; left: 540px; width: 80px; height: 80px; background-color: #FFC857; border-radius: 50%; z-index: 2;"></div>
<!-- Illustration Element 3 (White rect) -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 580px; left: 500px; width: 150px; height: 85px; background-color: #ffffff; border-radius: 8px; opacity: 0.92; z-index: 2;"></div>
<!-- Divider Line -->
<div data-object="true" data-object-type="shape" style="position: absolute; top: 760px; left: 80px; width: 634px; height: 3px; background-color: #1B3A6E; z-index: 1;"></div>
<!-- Chapter Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 790px; left: 80px; width: 634px; height: 50px; z-index: 10;">
<p style="font-size: 28px; color: #1B3A6E; font-weight: 700; line-height: 1.3;">4. 데이터 분석 / 예산·회계</p>
</div>
<!-- Section List -->
<!-- Increased height from 220 to 240 to prevent content overflow and clipping -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 850px; left: 80px; width: 634px; height: 240px; z-index: 10;">
<ul style="list-style: none; color: #5F5E5A; font-size: 18px; line-height: 1.8; font-weight: 400;">
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.1 엑셀 데이터 정리 자동화</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.2 데이터 분석</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.3 시각화</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.4 예산·회계 기본</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.5 회계 보고 및 점검</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.6 데이터 종합 실전</li>
<li style="position: relative; padding-left: 26px;"><span style="position: absolute; left: 0; color: #1B3A6E; font-weight: 700;">—</span> 4.7 데이터 보안 원칙</li>
</ul>
</div>
<!-- Page Number -->
<div data-object="true" data-object-type="textbox" style="position: absolute; top: 1083px; left: 80px; width: 634px; height: 20px; z-index: 10;">
<p style="font-size: 12px; color: #5F5E5A; text-align: left;">151</p>
</div>
</div>
</body>
</html>
